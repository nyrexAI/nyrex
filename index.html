<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nyrex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header class="topbar">
      <div class="brand">
        <img src="../assets/logo-header.png" alt="Nyrex" class="brand__mark" />
        <div class="brand__text">
          <span class="brand__name">Nyrex</span>
          <span class="brand__sub">AI INTERFACE</span>
        </div>
      </div>
      <button class="iconbtn" id="settingsBtn" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
          <path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" stroke="currentColor" stroke-width="1.6"/>
          <path d="M19.4 13.5a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V19.5a2 2 0 11-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H4.5a2 2 0 110-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H10a1.65 1.65 0 001-1.51V4.5a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V10a1.65 1.65 0 001.51 1h.09a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.4"/>
        </svg>
      </button>
    </header>

    <main class="thread" id="thread">
      <div class="entry entry--assistant">
        <div class="entry__avatar entry__avatar--assistant"></div>
        <div class="entry__content">
          <div class="entry__body">Hey, I'm Nyrex. Ask me anything — flip on <strong>live search</strong> if you want answers grounded in the current web, with sources cited.</div>
        </div>
      </div>
    </main>

    <form id="composer" class="composer">
      <div class="composer__box">
        <textarea id="input" class="composer__input" placeholder="Message Nyrex…" rows="1" autofocus></textarea>
        <div class="composer__controls">
          <label class="toggle">
            <input type="checkbox" id="searchToggle" />
            <span class="toggle__track"><span class="toggle__thumb"></span></span>
            <span class="toggle__label">live search</span>
          </label>
          <button type="submit" class="sendbtn" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
              <path d="M4 12h16M14 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </form>
  </div>

  <!-- Settings modal -->
  <div class="modal" id="settingsModal" hidden>
    <div class="modal__card">
      <div class="modal__header">
        <span>Settings</span>
        <button class="iconbtn" id="closeSettings" aria-label="Close">✕</button>
      </div>

      <label class="field">
        <span class="field__label">Provider</span>
        <select id="providerSelect" class="field__input">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI (GPT)</option>
        </select>
      </label>

      <label class="field">
        <span class="field__label">Anthropic API key</span>
        <input type="password" id="anthropicKey" class="field__input" placeholder="sk-ant-…" />
      </label>

      <label class="field">
        <span class="field__label">OpenAI API key</span>
        <input type="password" id="openaiKey" class="field__input" placeholder="sk-…" />
      </label>

      <p class="modal__hint">Keys are stored only on this computer and are never sent anywhere except directly to the provider you choose.</p>

      <button class="modal__save" id="saveSettings">Save</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
